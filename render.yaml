databases:
  - name: eduplan-db
    plan: free

services:
  - type: web
    name: eduplan-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eduplan-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: eduplan-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://eduplan-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://eduplan-web.onrender.com

  - type: web
    name: eduplan-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://eduplan-api.onrender.com/api
